name: Binary docker build

description: Build docker image for binary builds

inputs:
  docker-image-name:
    description: Docker image name for PR builds
    required: true
  docker-build-dir:
    description: Location of the build.sh relative to .ci/docker
    required: true
  custom-tag-prefix:
    description: Custom tag prefix for the docker image
    required: false
  DOCKER_TOKEN:
    description: Docker token for authentication
    required: true
  DOCKER_ID:
    description: Docker ID for authentication
    required: true

runs:
  using: composite
  steps:
    - name: Checkout PyTorch
      uses: pytorch/pytorch/.github/actions/checkout-pytorch@main

    # Build on a remote BuildKit builder (OSDC/ARC has no host docker daemon); build.sh honors REMOTE_BUILDKIT
    - name: Set up Docker Buildx (remote, no bootstrap)
      shell: bash
      run: |
        set -ex
        case "$(uname -m)" in
          aarch64|arm64) buildkit_addr="tcp://buildkitd-arm64.buildkit:1234" ;;
          *)             buildkit_addr="tcp://buildkitd-amd64.buildkit:1234" ;;
        esac
        docker buildx create \
          --name remote-buildkit \
          --driver remote \
          --use \
          "${buildkit_addr}"

    # ciflow/docker publishes to ECR via OIDC (works for fork SHAs too); other refs use Docker Hub
    - name: Login to ECR
      if: startsWith(github.ref, 'refs/tags/ciflow/docker/')
      uses: pytorch/pytorch/.github/actions/ecr-login@main
      with:
        aws-role-to-assume: arn:aws:iam::308535385114:role/arc

    - name: Build (and, on push, publish) via remote BuildKit
      env:
        REMOTE_BUILDKIT: "1"
        DOCKER_TOKEN: ${{ inputs.DOCKER_TOKEN }}
        DOCKER_ID: ${{ inputs.DOCKER_ID }}
        DOCKER_IMAGE_NAME: ${{ inputs.docker-image-name }}
        DOCKER_IMAGE_PREFIX: ${{ inputs.custom-tag-prefix }}
        DOCKER_BUILD_DIR: ${{ inputs.docker-build-dir }}
      shell: bash
      run: |
        set -euxo pipefail

        # checkout-pytorch may leave the tree owned by a different uid than the
        # step user on ARC; avoid git's "dubious ownership" error for rev-parse.
        git config --global --add safe.directory "${GITHUB_WORKSPACE}"

        GITHUB_REF=${GITHUB_REF:-$(git symbolic-ref -q HEAD || git describe --tags --exact-match)}
        GIT_BRANCH_NAME=${GITHUB_REF##*/}
        GIT_COMMIT_SHA=${GITHUB_SHA:-$(git rev-parse HEAD)}
        CI_FOLDER_SHA=$(git rev-parse HEAD:.ci/docker)

        # ciflow/docker -> ECR content-addressed tag (<variant>-<.ci/docker hash>); else Docker Hub branch/commit/hash tags (+ floating from main)
        if [[ "${GITHUB_REF:-}" == refs/tags/ciflow/docker/* ]]; then
          PREFIX="308535385114.dkr.ecr.us-east-1.amazonaws.com/pytorch/${DOCKER_IMAGE_NAME}:${DOCKER_IMAGE_PREFIX}"
          TAGS=(-t "${PREFIX}-${CI_FOLDER_SHA}")
        else
          PREFIX="docker.io/pytorch/${DOCKER_IMAGE_NAME}:${DOCKER_IMAGE_PREFIX}"
          TAGS=(
            -t "${PREFIX}-${GIT_BRANCH_NAME}"
            -t "${PREFIX}-${GIT_COMMIT_SHA}"
            -t "${PREFIX}-${CI_FOLDER_SHA}"
          )
          if [[ "${GIT_BRANCH_NAME}" == "main" ]]; then
            TAGS+=(-t "${PREFIX}")
          fi

          # WITH_PUSH gates publishing; log in to Docker Hub only on the push path (ECR uses the ecr-login step)
          set +x
          if [[ "${WITH_PUSH:-false}" == "true" ]]; then
            echo "${DOCKER_TOKEN}" | docker login docker.io -u "${DOCKER_ID}" --password-stdin
          fi
          set -x
        fi

        # build.sh reads REMOTE_BUILDKIT and buildx-pushes the passed -t tags.
        run_build() {
          ".ci/docker/${DOCKER_BUILD_DIR}/build.sh" "${DOCKER_IMAGE_NAME}:${DOCKER_IMAGE_PREFIX}" "${TAGS[@]}"
        }

        # Retry connection failures (not build errors): the autoscaled BuildKit pool may be cold at start
        attempts="${REMOTE_BUILDKIT_CONNECT_ATTEMPTS:-360}"
        delay="${REMOTE_BUILDKIT_CONNECT_DELAY:-15}"
        for attempt in $(seq 1 "${attempts}"); do
          build_log="$(mktemp)"
          set +e
          run_build 2>&1 | tee "${build_log}"
          rc="${PIPESTATUS[0]}"
          set -e
          if [[ "${rc}" -eq 0 ]]; then
            rm -f "${build_log}"
            break
          fi
          if [[ "${attempt}" -lt "${attempts}" ]] && grep -qiE \
            "waiting for connection|context deadline exceeded|server preface|failed to (dial|list workers)|connection (refused|reset)|no such host|transport: Error|i/o timeout|use of closed network connection|EOF" \
            "${build_log}"; then
            echo "Remote BuildKit not ready yet (attempt ${attempt}/${attempts}); retrying in ${delay}s..." >&2
            rm -f "${build_log}"
            sleep "${delay}"
            continue
          fi
          rm -f "${build_log}"
          exit "${rc}"
        done
