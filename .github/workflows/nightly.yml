# Owner(s): ["oncall: releng"]
name: nightly

on:
  schedule:
    - cron: 0 0 * * *
  push:
    tags:
      # NOTE: Doc build pipelines should only get triggered on:
      # Major or minor release candidates builds
      - v[0-9]+.[0-9]+.0+-rc[0-9]+
      # Final RC for major, minor and patch releases
      - v[0-9]+.[0-9]+.[0-9]+
      - ciflow/nightly/*
  workflow_dispatch:


concurrency:
  group: ${{ github.workflow }}--${{ github.event.pull_request.number || github.sha }}-${{ github.event_name == 'workflow_dispatch' }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  get-label-type:
    name: get-label-type
    uses: pytorch/pytorch/.github/workflows/_runner-determinator.yml@main
    if: ${{ (github.event_name != 'schedule' || github.repository == 'pytorch/pytorch') && github.repository_owner == 'pytorch' }}
    with:
      triggering_actor: ${{ github.triggering_actor }}
      issue_owner: ${{ github.event.pull_request.user.login || github.event.issue.user.login }}
      curr_branch: ${{ github.head_ref || github.ref_name }}
      curr_ref_type: ${{ github.ref_type }}
      check_experiments: lf

  link-check:
    name: Link checks
    needs: get-label-type
    uses: ./.github/workflows/_link_check.yml
    with:
      runner: ${{ needs.get-label-type.outputs.label-type }}
      docker-image: 308535385114.dkr.ecr.us-east-1.amazonaws.com/pytorch/ci-image:pytorch-linux-jammy-linter-${{ needs.get-label-type.outputs.ci-docker-hash }}
      ref:    ${{ github.sha }}
    secrets: inherit

  docs-build:
    name: docs build
    uses: ./.github/workflows/_linux-build.yml
    needs: get-label-type
    with:
      runner_prefix: "${{ needs.get-label-type.outputs.label-type }}"
      build-environment: linux-jammy-py3.10-gcc11
      docker-image-name: ci-image:pytorch-linux-jammy-py3.10-clang18
      ci-docker-hash: ${{ needs.get-label-type.outputs.ci-docker-hash }}
      python-version: "3.10"
      compiler: gcc11
    secrets: inherit

  docs-push:
    name: docs push
    uses: ./.github/workflows/_docs.yml
    needs:
      - docs-build
      - get-label-type
    with:
      runner_prefix: "${{ needs.get-label-type.outputs.label-type }}"
      build-environment: linux-jammy-py3.10-gcc11
      docker-image: ${{ needs.docs-build.outputs.docker-image }}
      push: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || startsWith(github.event.ref, 'refs/tags/v') }}
      run-doxygen: true
      python-version: "3.10"
      compiler: gcc11
    secrets:
      GH_PYTORCHBOT_TOKEN: ${{ secrets.GH_PYTORCHBOT_TOKEN }}

  update-metamates-rule:
    if: github.repository_owner == 'pytorch' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    environment: update-commit-hash
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.UPDATEBOT_TOKEN }}
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.10'
      - name: Install requirements
        run: pip install pyyaml==6.0.2
      - name: Update metamates rule
        env:
          # Reading the closed pytorch/metamates team needs an org-member token;
          # pytorchupdatebot is not an org member, so use pytorchbot here.
          GH_TOKEN: ${{ secrets.GH_PYTORCHBOT_TOKEN }}
        run: |
          python .github/scripts/update_metamates_rule.py
      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.UPDATEBOT_TOKEN }}
          PYTORCHBOT_TOKEN: ${{ secrets.GH_PYTORCHBOT_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "No changes detected"
            exit 0
          fi
          git config user.name "PyTorch UpdateBot"
          git config user.email "pytorchupdatebot@users.noreply.github.com"
          BRANCH="update-metamates-rule"
          TITLE="Update Metamates merge rule"
          EXISTING=$(gh pr list --author pytorchupdatebot --search "$TITLE" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            BRANCH=$(gh pr view "$EXISTING" --json headRefName --jq '.headRefName')
          fi
          git checkout -b "$BRANCH"
          git add .github/merge_rules.yaml
          git commit -m "Update Metamates merge rule"
          git push --set-upstream origin "$BRANCH" -f
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --title "$TITLE" \
              --body "$(cat <<'EOF'
          This PR is auto-generated nightly by [this action](https://github.com/pytorch/pytorch/blob/main/.github/workflows/nightly.yml).

          Updates the Metamates merge rule with active team members.
          EOF
            )"
          fi

  update-commit-hashes:
    runs-on: ubuntu-24.04
    environment: update-commit-hash
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo-name: vision
            repo-owner: pytorch
            branch: main
            pin-folder: .github/ci_commit_pins
          - repo-name: audio
            repo-owner: pytorch
            branch: main
            pin-folder: .github/ci_commit_pins
          # executorch jobs are disabled since it needs some manual work for the hash update
          # - repo-name: executorch
          #   repo-owner: pytorch
          #   branch: main
          #   pin-folder: .ci/docker/ci_commit_pins
          - repo-name: vllm
            repo-owner: vllm-project
            branch: main
            pin-folder: .github/ci_commit_pins
          - repo-name: torchtitan
            repo-owner: pytorch
            branch: main
            pin-folder: .github/ci_commit_pins
          - repo-name: torchcomms
            repo-owner: meta-pytorch
            branch: main
            pin-folder: .github/ci_commit_pins
    # Allow this to be triggered on either a schedule or on workflow_dispatch to allow for easier testing
    if: github.repository_owner == 'pytorch' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    steps:
      - name: "${{ matrix.repo-owner }}/${{ matrix.repo-name }} update-commit-hash"
        uses: pytorch/test-infra/.github/actions/update-commit-hash@main
        with:
          repo-owner: ${{ matrix.repo-owner }}
          repo-name: ${{ matrix.repo-name }}
          branch: ${{ matrix.branch }}
          pin-folder: ${{ matrix.pin-folder}}
          updatebot-token: ${{ secrets.UPDATEBOT_TOKEN }}
          pytorchbot-token: ${{ secrets.GH_PYTORCHBOT_TOKEN }}

  update-triton-commit-hash:
    # Tracks the triton release branch from triton_version.txt and opens a labeled, self-merging pin-bump PR.
    runs-on: ubuntu-24.04
    environment: update-commit-hash
    if: github.repository_owner == 'pytorch' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.UPDATEBOT_TOKEN }}
      - name: Update Triton pin and open labeled PR
        env:
          UPDATEBOT_TOKEN: ${{ secrets.UPDATEBOT_TOKEN }}
          PYTORCHBOT_TOKEN: ${{ secrets.GH_PYTORCHBOT_TOKEN }}
          REPO: ${{ github.repository }}
          NEW_BRANCH_NAME: update-triton-commit-hash/${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}
          PR_TITLE: "[triton hash update] update the pinned triton hash"
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < .ci/docker/triton_version.txt)"
          release_branch="release/$(echo "${version}" | cut -d. -f1,2).x"
          pin_file=".ci/docker/ci_commit_pins/triton.txt"
          old_hash="$(tr -d '[:space:]' < "${pin_file}")"
          new_hash="$(git ls-remote "https://github.com/triton-lang/triton.git" "refs/heads/${release_branch}" | cut -f1)"
          if [ -z "${new_hash}" ]; then
            echo "Could not resolve tip of triton ${release_branch}"
            exit 1
          fi
          echo "triton ${version} (${release_branch}): pinned ${old_hash} -> tip ${new_hash}"
          if [ "${new_hash}" = "${old_hash}" ]; then
            echo "Triton pin already up to date; nothing to do"
            exit 0
          fi

          existing_branch="$(GH_TOKEN="${UPDATEBOT_TOKEN}" gh pr list --repo "${REPO}" \
            --author pytorchupdatebot --search "in:title triton hash update" --state open \
            --json headRefName --jq '.[0].headRefName // empty')"
          branch="${existing_branch:-${NEW_BRANCH_NAME}}"

          git config user.name "PyTorch UpdateBot"
          git config user.email "pytorchupdatebot@users.noreply.github.com"
          printf '%s\n' "${new_hash}" > "${pin_file}"
          git checkout -B "${branch}"
          git add "${pin_file}"
          git commit -m "update triton commit hash"
          git push --set-upstream origin "${branch}" -f

          if [ -z "${existing_branch}" ]; then
            GH_TOKEN="${UPDATEBOT_TOKEN}" gh pr create --repo "${REPO}" \
              --base main --head "${branch}" --title "${PR_TITLE}" \
              --body "Auto-generated nightly by .github/workflows/nightly.yml. Updates the pinned triton hash to the tip of ${release_branch}." \
              --label "ciflow/trunk" \
              --label "ciflow/inductor" \
              --label "ciflow/inductor-periodic" \
              --label "ciflow/h100" \
              --label "ciflow/b200" \
              --label "ciflow/docker" \
              --label "topic: not user facing"
            GH_TOKEN="${PYTORCHBOT_TOKEN}" gh pr review "${branch}" --repo "${REPO}" --approve
          fi
          GH_TOKEN="${PYTORCHBOT_TOKEN}" gh pr comment "${branch}" --repo "${REPO}" --body "@pytorchbot merge"
