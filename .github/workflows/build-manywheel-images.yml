# Owner(s): ["oncall: releng"]
name: Build manywheel docker images

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - release/*
    tags:
      # NOTE: Binary build pipelines should only get triggered on release candidate or nightly builds
      # Release candidate tags look like: v1.11.0-rc1
      - v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+
      # ciflow/docker: build + push the content-addressed image to ECR for PR testing
      - ciflow/docker/*
    paths:
      - .ci/docker/**
      - .github/workflows/build-manywheel-images.yml
      - .github/actions/binary-docker-build/**

env:
  DOCKER_BUILDKIT: 1
  # Publish to Docker Hub on main/release/v*, to ECR on ciflow/docker (chosen per-ref in binary-docker-build)
  WITH_PUSH: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release') || startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/ciflow/docker/')) }}
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}-${{ github.event_name == 'workflow_dispatch' }}
  cancel-in-progress: true

jobs:
  select-runner:
    if: github.repository_owner == 'pytorch'
    runs-on: ubuntu-24.04
    outputs:
      x86: ${{ steps.pick.outputs.x86 }}
      arm64: ${{ steps.pick.outputs.arm64 }}
    steps:
      - id: pick
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/heads/main || "${GITHUB_REF}" == refs/heads/nightly || "${GITHUB_REF}" == refs/heads/release/* || "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "x86=mt-rel-l-x86iavx512-44-340" >> "${GITHUB_OUTPUT}"
            echo "arm64=mt-rel-l-arm64g3-44-340" >> "${GITHUB_OUTPUT}"
          else
            echo "x86=mt-l-x86iavx512-48-384" >> "${GITHUB_OUTPUT}"
            echo "arm64=mt-l-arm64g3-61-463" >> "${GITHUB_OUTPUT}"
          fi

  build:
    if: github.repository_owner == 'pytorch'
    needs: select-runner
    # id-token: write lets the ciflow/docker path assume the ECR push role via OIDC
    permissions:
      id-token: write
      contents: read
    environment: ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release') || startsWith(github.ref, 'refs/tags/v')) && 'docker-build') || '' }}
    runs-on: ${{ matrix.runner }}
    container:
      image: ghcr.io/actions/actions-runner:latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include: [
          { name: "manylinux2_28-builder",          tag: "cuda13.2",          runner: "${{ needs.select-runner.outputs.x86 }}" },
          { name: "manylinux2_28-builder",          tag: "cuda13.0",          runner: "${{ needs.select-runner.outputs.x86 }}" },
          { name: "manylinux2_28-builder",          tag: "cuda12.6",          runner: "${{ needs.select-runner.outputs.x86 }}" },
          { name: "manylinuxaarch64-builder",       tag: "cuda13.2",          runner: "${{ needs.select-runner.outputs.arm64 }}" },
          { name: "manylinuxaarch64-builder",       tag: "cuda13.0",          runner: "${{ needs.select-runner.outputs.arm64 }}" },
          { name: "manylinuxaarch64-builder",       tag: "cuda12.6",          runner: "${{ needs.select-runner.outputs.arm64 }}" },
          { name: "manylinux2_28-builder",          tag: "rocm7.1",           runner: "${{ needs.select-runner.outputs.x86 }}" },
          { name: "manylinux2_28-builder",          tag: "rocm7.2",           runner: "${{ needs.select-runner.outputs.x86 }}" },
          { name: "manylinux2_28-builder",          tag: "cpu",               runner: "${{ needs.select-runner.outputs.x86 }}" },
          { name: "manylinux2_28_aarch64-builder",  tag: "cpu-aarch64",       runner: "${{ needs.select-runner.outputs.arm64 }}" },
          { name: "manylinux2_28-builder",          tag: "xpu",               runner: "${{ needs.select-runner.outputs.x86 }}" },
        ]
    name: ${{ matrix.name }}:${{ matrix.tag }}
    steps:
      - name: Build docker image
        uses: pytorch/pytorch/.github/actions/binary-docker-build@main
        with:
          docker-image-name: ${{ matrix.name }}
          custom-tag-prefix: ${{ matrix.tag }}
          docker-build-dir: manywheel
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          DOCKER_ID: ${{ secrets.DOCKER_ID }}
