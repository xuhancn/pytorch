# Owner(s): ["module: ci"]
# The point of this workflow is to test that a FA3 wheel that was built based off the
# stable ABI targeting 2.9 can still run on the newer torch.
#
# This workflow is very similar to the _linux-test.yml workflow, with the following
# differences:
#   1. It is simpler (there is no test matrix)
#   2. It pulls flash-attention as a secondary repository in order to access the tests.
#      Note that it does not BUILD anything from flash-attention, as we have a prebuilt
#      wheel. We pull flash-attention only to run a few tests.
#   3. It runs only FA3 tests. No PyTorch tests are run.
name: linux-test-stable-fa3

on:
  workflow_call:
    inputs:
      build-environment:
        required: true
        type: string
        description: Top-level label for what's being built/tested.
      docker-image:
        required: true
        type: string
        description: Docker image to run in.
      timeout-minutes:
        required: false
        type: number
        default: 60
        description: |
          Set the maximum (in minutes) how long the workflow should take to finish
      s3-bucket:
        description: S3 bucket to download artifact
        required: false
        type: string
        default: "gha-artifacts"
      python-version:
        required: false
        type: string
        default: ""
        description: Python version to use for the OSDC test.
      compiler:
        required: false
        type: string
        default: ""
        description: Compiler to use for the OSDC test.
      cuda-version:
        required: false
        type: string
        default: ""
        description: CUDA version to use for the OSDC test.
    secrets:
      HUGGING_FACE_HUB_TOKEN:
        required: false
        description: |
          HF Auth token to avoid rate limits when downloading models or datasets from hub
      VLLM_TEST_HUGGING_FACE_TOKEN:
        required: false
        description: |
          HF Auth token to test vllm
      SCRIBE_GRAPHQL_ACCESS_TOKEN:
        required: false
        description: |
          FB app token to write to scribe endpoint

env:
  GIT_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

jobs:
  test:
    # Don't run on forked repos
    if: github.repository_owner == 'pytorch'
    runs-on: mt-l-x86iamx-22-225-h100
    container:
      image: ${{ inputs.docker-image }}
      options: "--gpus all"
    timeout-minutes: ${{ inputs.timeout-minutes || 60 }}
    permissions:
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Setup Linux
        id: setup-linux
        uses: pytorch/pytorch/.github/actions/setup-linux@main
        with:
          use-arc: true
          python-version: ${{ inputs.python-version }}
          compiler: ${{ inputs.compiler }}
          cuda-version: ${{ inputs.cuda-version }}
          submodules: 'false'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout flash-attention as a secondary repository
        uses: actions/checkout@v4
        with:
          repository: Dao-AILab/flash-attention
          path: flash-attention

      - name: Configure AWS credentials
        id: aws-creds
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
        with:
          role-to-assume: arn:aws:iam::308535385114:role/arc
          aws-region: us-east-1
          role-duration-seconds: 18000

      - name: Download build artifacts
        uses: pytorch/pytorch/.github/actions/download-build-artifacts@main
        with:
          name: ${{ inputs.build-environment }}
          s3-bucket: ${{ inputs.s3-bucket }}
          use-gha: ${{ steps.aws-creds.outcome != 'success' }}

      - name: Set Test step time
        id: test-timeout
        shell: bash
        env:
          JOB_TIMEOUT: ${{ inputs.timeout-minutes }}
        run: |
          echo "timeout=$((JOB_TIMEOUT-30))" >> "${GITHUB_OUTPUT}"

      - name: Test
        id: test
        timeout-minutes: ${{ fromJson(steps.test-timeout.outputs.timeout) }}
        env:
          BUILD_ENVIRONMENT: ${{ inputs.build-environment }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_JOB: ${{ github.job }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          JOB_ID: ${{ steps.setup-linux.outputs.job-id }}
          JOB_NAME: ${{ steps.setup-linux.outputs.job-name }}
          BRANCH: ${{ steps.setup-linux.outputs.branch }}
          SHA1: ${{ github.event.pull_request.head.sha || github.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.sha }}
          VLLM_TEST_HUGGING_FACE_TOKEN: ${{ secrets.VLLM_TEST_HUGGING_FACE_TOKEN }}
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HUGGING_FACE_HUB_TOKEN }}
          SCRIBE_GRAPHQL_ACCESS_TOKEN: ${{ secrets.SCRIBE_GRAPHQL_ACCESS_TOKEN }}
          ARTIFACTS_FILE_SUFFIX: ${{ github.job }}-${{ steps.setup-linux.outputs.job-id }}
          USE_ARC: "1"
        shell: bash
        run: |
          set -x

          TEST_COMMAND=.ci/pytorch/test_fa3_abi_stable.sh

          # shellcheck disable=SC2046
          python3 -m pip install $(echo dist/*.whl)[opt-einsum]
          ${TEST_COMMAND}

      - name: Print remaining test logs
        shell: bash
        if: always() && steps.test.conclusion
        run: |
          cat test/**/*_toprint.log || true
